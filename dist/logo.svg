    <line x1="375" y1="195" x2="425" y2="165" stroke="#3B82F6" stroke-width="2" stroke-dasharray="3 8" opacity="0.25" />
    <line x1="115" y1="155" x2="125" y2="320" stroke="#3B82F6" stroke-width="2" stroke-dasharray="3 8" opacity="0.2" />
    <line x1="245" y1="305" x2="285" y2="425" stroke="#3B82F6" stroke-width="2" stroke-dasharray="3 8" opacity="0.2" />
  </g>

