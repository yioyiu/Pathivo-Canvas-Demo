    <line x1="195" y1="235" x2="115" y2="155" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.35" />
    <line x1="330" y1="125" x2="425" y2="165" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.35" />
    <line x1="195" y1="365" x2="125" y2="320" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.35" />
    <line x1="300" y1="320" x2="285" y2="425" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.35" />
