  <circle cx="375" cy="195" r="5" fill="#ffffff" opacity="0.15" />
  <circle cx="360" cy="275" r="18" fill="#3B82F6" />
  <circle cx="300" cy="320" r="15" fill="#3B82F6" opacity="0.85" />
  <circle cx="245" cy="305" r="15" fill="#3B82F6" opacity="0.85" />

