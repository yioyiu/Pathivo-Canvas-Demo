  <circle cx="425" cy="165" r="7" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.5" />
  <circle cx="425" cy="165" r="3" fill="#60A5FA" opacity="0.3" />
  <circle cx="125" cy="320" r="7" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.5" />
  <circle cx="125" cy="320" r="3" fill="#60A5FA" opacity="0.3" />
  <circle cx="285" cy="425" r="7" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.5" />
