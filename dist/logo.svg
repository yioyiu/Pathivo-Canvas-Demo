<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F8FAFF" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </radialGradient>
    <radialGradient id="nodeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="1" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="40%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.6" />
    </linearGradient>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <path d="M 195 75
           Q 265 68 340 108
           T 385 195
           T 350 285
           T 245 320
           L 195 235
           L 195 365
           L 195 448"
        fill="none" stroke="#60A5FA" stroke-width="2" stroke-dasharray="4 10" opacity="0.4" />

  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="195" y1="128" x2="195" y2="235" stroke="url(#spineGrad)" stroke-width="7" filter="url(#glow-subtle)" />
    <line x1="195" y1="235" x2="195" y2="365" stroke="#3B82F6" stroke-width="6" />
    <line x1="195" y1="365" x2="195" y2="430" stroke="#2563EB" stroke-width="5" opacity="0.6" />

    <line x1="195" y1="105" x2="260" y2="95" stroke="url(#bowlGrad)" stroke-width="5" />
    <line x1="260" y1="95" x2="330" y2="125" stroke="#3B82F6" stroke-width="5" />
    <line x1="330" y1="125" x2="375" y2="195" stroke="#3B82F6" stroke-width="5" />
    <line x1="375" y1="195" x2="360" y2="275" stroke="#3B82F6" stroke-width="5" />
